# Tatva.ai - Docker Deployment

version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tatvai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./transcripts:/app/transcripts
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: tatvai-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
